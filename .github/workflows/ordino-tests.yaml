name: ordino playwright tests

on:
  push:
    branches: ['main']
  pull_request:
    branches: ['main']
  workflow_dispatch:

jobs:
  run-tests:
    name: playwright automation tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Write .env for CI
        run: |
          DEFAULT_URL='https://opensource-demo.orangehrmlive.com'
          EFFECTIVE_URL="${BASE_URL:-$DEFAULT_URL}"
          if [ -z "${BASE_URL}" ]; then
            echo "::notice::BASE_URL Actions variable unset; using public OrangeHRM demo. Set repository variable BASE_URL to override."
          fi
          printf 'BASE_URL=%s\n' "${EFFECTIVE_URL}" > .env
        env:
          BASE_URL: ${{ vars.BASE_URL }}
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'package-lock.json'
      - name: Install dependencies
        run: npm ci
      - name: Install Playwright browser
        run: npx playwright install chromium --with-deps
      - name: Run tests
        run: npm run ui:headless

      - name: Publish test results (JUnit)
        if: always()
        uses: dorny/test-reporter@v3
        with:
          name: playwright test results
          path: test-results/results.xml
          reporter: java-junit
          fail-on-error: false

      - name: Upload JSON report (pipeline import)
        uses: actions/upload-artifact@v6
        if: always()
        with:
          name: playwright-report-json
          path: test-results/results.json

      - name: Upload full test-results report
        uses: actions/upload-artifact@v6
        if: always()
        with:
          name: playwright-report
          path: test-results/
